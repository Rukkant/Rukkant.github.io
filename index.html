<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Absolute Solver Diagnostic</title>
    <style>
        body { 
            background-color: #030303; 
            color: #730004; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0;
            padding: 40px;
            overflow: hidden;
            text-shadow: 0 0 8px rgba(115, 0, 4, 0.6);
        }
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }
        .cursor {
            display: inline-block;
            background-color: #730004;
            width: 10px;
            height: 18px;
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        input, button {
            background-color: #111;
            color: #730004;
            border: 1px solid #730004;
            padding: 10px;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background-color: #730004;
            color: black;
            cursor: pointer;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background-color: #050b14;
            border: 2px solid #0088ff;
            padding: 30px;
            width: 400px;
            text-align: center;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.4);
        }
        .modal-box h3 { color: #0088ff; margin-top: 0; }
        .modal-box p { color: white; margin-bottom: 20px; }
        .modal-box button {
            background-color: #111;
            color: #0088ff;
            border: 1px solid #0088ff;
            padding: 8px 20px;
            cursor: pointer;
        }
        .modal-box button:hover {
            background-color: #0088ff;
            color: black;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <h1 id="terminal-text"></h1>
        <h2>[JCJENSON ORBITAL RELAY INFRASTRUCTURE]</h2>
        <p>CAUTION: RESTRICTED ACCESS TERMINAL</p>
        <br>
        <label for="passwordInput">ENTER SECURE ACCESS KEY:</label>
        <br><br>
        <input type="text" id="passwordInput" placeholder="SYSTEM_LOGIN..." autocomplete="off">
        <button onclick="checkPassword()">SUBMIT</button>
        <div id="feedbackMessage"></div>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-box">
            <h3>SYSTEM CORRUPTION: MAX / ADMIN123</h3>
            <p>"Who are you... how did you know me?"</p>
            <button onclick="dismissAlert()">OK</button>
        </div>
    </div>

    <script>
        const textToType = "Absolute Solver Terminal initialized...";
        let index = 0;
        const speed = 70;

        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("terminal-text").innerHTML = 
                    textToType.substring(0, index + 1) + '<span class="cursor"></span>';
                index++;
                setTimeout(typeWriter, speed);
            }
        }
        window.onload = typeWriter;

        function checkPassword() {
            const input = document.getElementById("passwordInput").value.toUpperCase().trim();
            const feedback = document.getElementById("feedbackMessage");

            if (input === "ADMIN123") {
                feedback.style.color = "#00ff33";
                feedback.innerHTML = "ACCESS GRANTED. DECRYPTING TERMINAL CONNECTIONS...";
                document.getElementById("customAlert").style.display = "flex";
            } else {
                feedback.style.color = "#ff3333";
                feedback.style.fontSize = "22px";
                feedback.style.fontWeight = "bold";
                
                // Injected with Cyn's signature yellow color matching your custom stylesheet logs
                feedback.innerHTML = '<div style="margin-top: 30px; padding: 20px; border: 3px dashed #ff3333; background-color: #120002; box-shadow: 0 0 20px #ff3333; display: flex; align-items: center; justify-content: space-between; text-align: left;"><div style="flex: 1; padding-right: 20px;"><span style="color: #ffaa00; font-size: 80px; text-shadow: 0 0 20px #ffaa00; display: block; margin-bottom: 10px;">[ X ]</span><span style="color: #ff3333; display: block; font-size: 16px; letter-spacing: 2px; animation: blink 0.4s infinite;">CRITICAL SYSTEM CORRUPTION DETECTED</span><p style="color: #fff; font-size: 11px; margin-top: 15px; font-family: monospace; opacity: 0.8;">"The Solver is watching, user... You do not belong here."</p></div><div style="flex: 1; font-family: monospace; font-size: 16px; color: #00ff33; text-shadow: 0 0 8px rgba(0,255,51,0.6); text-align: center; line-height: 1.6;"><div>01010100 01101000 01100101 00100000 01010000 01100001 01110011 01110011 01110111 01101111 01110010 01100100 00100000 01101001 01110011 00100000 00100010 01000001 01000100 01001101 01001001 01001110 00110001 00110010 00110011 00100010</div><div style="margin-top: 15px; color: #ffaa00; font-weight: bold; font-size: 20px; text-shadow: 0 0 8px #ffaa00;">-Cyn</div></div></div>';
            }
        }

        function dismissAlert() {
            document.getElementById("customAlert").style.display = "none";
            window.location.href = "./cflab-7a2d/subjects.html";
        }
    </script>
</body>
</html>
